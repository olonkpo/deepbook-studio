<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>DeepBook Studio</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div id="app">
    <div class="splash">
      <div class="splash__logo">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="64" height="64" rx="12" fill="#1F3A6E"/>
          <path d="M16 20h32M16 28h24M16 36h28M16 44h20" stroke="#5B9BD5" stroke-width="3"
            stroke-linecap="round"/>
          <circle cx="48" cy="44" r="8" fill="#2E6DA4"/>
          <path d="M45 44l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="splash__title">DeepBook Studio</h1>
      <p class="splash__subtitle">AI-Powered Book Writing</p>
      <div class="splash__spinner" aria-label="Loading..."></div>
      <p class="splash__status" id="status">Connecting to backend...</p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
